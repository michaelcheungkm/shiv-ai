<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Receive</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #111; --surface: #1a1a1a; --border: #2a2a2a;
    --text: #eee; --muted: #666; --accent: #7c6af7;
    --success: #4af0a0; --warn: #f0a04a;
  }
  body {
    background: var(--bg); color: var(--text);
    font-family: system-ui, -apple-system, sans-serif;
    min-height: 100dvh; display: flex; flex-direction: column;
    align-items: center; padding: 16px; gap: 12px;
  }

  /* ── Unlock overlay ── */
  #unlock {
    position: fixed; inset: 0; z-index: 99;
    background: #111; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 14px;
  }
  #unlock .icon { font-size: 40px; }
  #unlock .t { font-weight: 700; font-size: 20px; }
  #unlock .s { font-size: 13px; color: var(--muted); }
  .btn {
    background: var(--accent); border: none; border-radius: 8px; color: #fff;
    font-size: 16px; font-weight: 600; padding: 14px 32px; cursor: pointer;
    transition: opacity 0.15s;
  }
  .btn:active { opacity: 0.75; }

  /* ── Top bar ── */
  .topbar { display: flex; align-items: center; justify-content: space-between; width: 100%; }
  .title { font-weight: 700; font-size: 18px; }
  .pill { font-size: 12px; color: var(--muted); border: 1px solid var(--border); border-radius: 99px; padding: 3px 10px; }
  .pill.on  { color: var(--success); border-color: var(--success); }
  .pill.ing { color: var(--accent);  border-color: var(--accent); }

  input[type=text] {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 15px; padding: 10px 12px; outline: none;
  }
  input[type=text]:focus { border-color: var(--accent); }

  hr { border: none; border-top: 1px solid var(--border); width: 100%; }

  /* ── Speaking indicator ── */
  .speaker {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 20px 16px;
    display: flex; flex-direction: column; align-items: center; gap: 12px;
    min-height: 120px; justify-content: center;
  }
  .wave { display: flex; align-items: center; gap: 4px; height: 32px; }
  .bar { width: 4px; border-radius: 2px; background: var(--border); height: 4px; transition: background 0.3s; }
  .speaking .bar { background: var(--accent); animation: wav 0.6s ease-in-out infinite; }
  .bar:nth-child(1) { animation-delay: 0.00s; }
  .bar:nth-child(2) { animation-delay: 0.12s; }
  .bar:nth-child(3) { animation-delay: 0.24s; }
  .bar:nth-child(4) { animation-delay: 0.12s; }
  .bar:nth-child(5) { animation-delay: 0.00s; }
  @keyframes wav { 0%,100%{height:4px} 50%{height:28px} }

  .np-voice { font-size: 11px; color: var(--accent); letter-spacing: 0.1em; opacity: 0; transition: opacity 0.3s; }
  .np-voice.show { opacity: 1; }
  .np-text { font-size: 18px; font-weight: 600; line-height: 1.4; text-align: center; color: var(--text); opacity: 0; transition: opacity 0.3s; max-width: 100%; }
  .np-text.show { opacity: 1; }
  .np-idle { font-size: 14px; color: var(--muted); }

  /* ── Queue + history ── */
  .label { font-size: 12px; color: var(--muted); align-self: flex-start; }
  .qpill { font-size: 12px; color: var(--muted); border: 1px solid var(--border); border-radius: 99px; padding: 3px 10px; }
  .qpill.has { color: var(--accent); border-color: var(--accent); }
  #history { display: flex; flex-wrap: wrap; gap: 6px; width: 100%; }
  .hitem {
    background: var(--surface); border-radius: 5px; padding: 4px 8px;
    font-size: 12px; color: var(--muted); max-width: 160px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
</style>
</head>
<body>

<div id="unlock">
  <div class="icon">🔊</div>
  <div class="t">TTScast · Receive</div>
  <div class="s">Tap to enable audio</div>
  <button class="btn" onclick="unlock()">Activate</button>
</div>

<div class="topbar">
  <div class="title">TTScast · Recv</div>
  <div class="pill" id="pill">● disconnected</div>
</div>

<input type="text" id="server" value="ws://localhost:8000" placeholder="ws://server:8000">

<hr>

<div class="speaker" id="speaker">
  <div class="wave" id="wave">
    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    <div class="bar"></div><div class="bar"></div>
  </div>
  <div class="np-voice" id="np-voice"></div>
  <div class="np-text"  id="np-text"></div>
  <div class="np-idle"  id="np-idle">Waiting for audio…</div>
</div>

<div class="qpill" id="qpill">0 queued</div>

<div class="label">History</div>
<div id="history"></div>

<script>
const audioQueue = [];
let playing = false, ws = null, pendingMeta = null;
let audioCtx = null, keepalive = null, unlocked = false, reconnTimer = null;

const $ = id => document.getElementById(id);

function getCtx() {
  if (!audioCtx || audioCtx.state === 'closed')
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function startKeepalive() {
  const ctx = getCtx(); if (keepalive) return;
  const buf = ctx.createBuffer(1, ctx.sampleRate, ctx.sampleRate);
  keepalive = ctx.createBufferSource(); keepalive.buffer = buf; keepalive.loop = true;
  const g = ctx.createGain(); g.gain.value = 0;
  keepalive.connect(g); g.connect(ctx.destination); keepalive.start();
}

document.addEventListener('visibilitychange', () => {
  if (audioCtx?.state === 'suspended') audioCtx.resume();
});

function unlock() {
  if (unlocked) return; unlocked = true;
  getCtx().resume().then(startKeepalive);
  $('unlock').remove();
  connect();
}

function connect() {
  if (reconnTimer) { clearTimeout(reconnTimer); reconnTimer = null; }
  if (ws && ws.readyState <= 1) return;
  const url = $('server').value.replace(/\/$/, '') + '/ws/receiver';
  setConn('ing');
  ws = new WebSocket(url);
  ws.onopen = () => setConn('on');
  ws.onmessage = async evt => {
    if (typeof evt.data === 'string') { pendingMeta = JSON.parse(evt.data); }
    else {
      const ab = await evt.data.arrayBuffer();
      audioQueue.push({ meta: pendingMeta || {}, ab });
      pendingMeta = null; updateQ();
      if (!playing) playNext();
    }
  };
  ws.onclose = () => { setConn(''); reconnTimer = setTimeout(connect, 3000); };
  ws.onerror = () => ws.close();
}

function setConn(s) {
  const p = $('pill');
  if (s === 'on')  { p.textContent = '● connected';   p.className = 'pill on'; }
  else if (s === 'ing') { p.textContent = '○ connecting…'; p.className = 'pill ing'; }
  else             { p.textContent = '● disconnected'; p.className = 'pill'; }
}

function updateQ() {
  const n = audioQueue.length, q = $('qpill');
  q.textContent = `${n} queued`; q.className = 'qpill' + (n ? ' has' : '');
}

async function playNext() {
  if (!audioQueue.length) { playing = false; setIdle(); return; }
  playing = true;
  const { meta, ab } = audioQueue.shift(); updateQ(); setSpeaking(meta);
  const ctx = getCtx();
  if (ctx.state === 'suspended') await ctx.resume();
  let decoded;
  try { decoded = await ctx.decodeAudioData(ab.slice(0)); }
  catch (e) { addHistory(meta.text || ''); playNext(); return; }
  const src = ctx.createBufferSource(); src.buffer = decoded; src.connect(ctx.destination);
  src.onended = () => { addHistory(meta.text || ''); playNext(); };
  src.start();
}

function setSpeaking(meta) {
  const sp = $('speaker'), w = $('wave');
  sp.classList.add('speaking'); w.classList.add('speaking');
  $('np-idle').style.display = 'none';
  $('np-voice').textContent = (meta.voice_label || meta.voice || '').replace(/\s*\(.*\)/, '');
  $('np-voice').classList.add('show');
  $('np-text').textContent = meta.text || ''; $('np-text').classList.add('show');
}

function setIdle() {
  $('speaker').classList.remove('speaking'); $('wave').classList.remove('speaking');
  $('np-idle').style.display = '';
  $('np-voice').classList.remove('show'); $('np-text').classList.remove('show');
}

function addHistory(text) {
  if (!text) return;
  const el = $('history'), d = document.createElement('div');
  d.className = 'hitem'; d.textContent = text; d.title = text;
  el.prepend(d);
  if (el.children.length > 16) el.lastChild.remove();
}

$('server').addEventListener('change', () => {
  if (ws) { ws.onclose = null; ws.close(); ws = null; } connect();
});
</script>
</body>
</html>
